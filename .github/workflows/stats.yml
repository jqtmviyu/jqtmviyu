name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *" # 每天凌晨 3 点
  workflow_dispatch:    # 支持手动触发

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 用于 push

    steps:
      - uses: actions/checkout@v6

      # 创建目录，避免和其他 workflow 冲突
      - run: mkdir -p dist/stats dist/snake

      # 生成 stats 卡片
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=transparent&count_private=true&custom_title=Stats
          path: dist/stats/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 生成 top-langs 卡片
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=transparent&langs_count=6
          path: dist/stats/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 推送到 output 分支，不会覆盖 snake
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: "Update README cards"
          allow_empty_commit: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
