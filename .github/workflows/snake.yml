name: Update README cards + Snake Animation

on:
  schedule:
    - cron: "0 3 * * *" # 每天凌晨 3 点
  workflow_dispatch:    # 支持手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # 用于 push

    steps:
      # Checkout 仓库
      - uses: actions/checkout@v6

      # 创建目录，避免覆盖
      - run: mkdir -p dist/stats dist/snake

      ###############################
      # GitHub Readme Stats 部分
      ###############################

      # 生成 stats 卡片
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=transparent&count_private=true&custom_title=Stats
          path: dist/stats/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 生成 top-langs 卡片
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=transparent&langs_count=6
          path: dist/stats/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 可选：生成 pin 卡片
      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=<your-repo>
          path: dist/stats/pin.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      ###############################
      # Snake 动画部分
      ###############################

      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake/github-contribution-grid-snake.svg
            dist/snake/github-contribution-grid-snake-dark.svg?palette=github-dark

      ###############################
      # 推送到 output 分支
      ###############################
      - name: Push all generated cards to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: "Update stats and snake cards"
          allow_empty_commit: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
